{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <!-- static CSS -->
    <link rel="stylesheet" href="{% static 'css/my_style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/evolved.css' %}" />

    <!-- Fontawesome Icons -->
    <script
      src="https://kit.fontawesome.com/b64bf0110e.js"
      crossorigin="anonymous"
    ></script>

    <title>{% block title %}To-Do List{% endblock %}</title>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'home' %}">To-Do List</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <!-- Navbar Add Task button — opens modal -->
          <button
            class="btn btn-outline-secondary"
            type="button"
            data-bs-toggle="modal"
            data-bs-target="#addTaskModal"
          >
            + Add Task
          </button>
        </div>
      </div>
    </nav>

    <!-- Add Task Modal -->
    <div
      class="modal fade"
      id="addTaskModal"
      tabindex="-1"
      aria-labelledby="addTaskModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content task-form-card">
          <div class="task-form-header">
            <span class="task-form-icon">✦</span>
            <h5 class="task-form-title" id="addTaskModalLabel">New Task</h5>
            <button
              type="button"
              class="btn-close btn-close-white ms-auto"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="task-form-body">
            <form
              method="post"
              enctype="multipart/form-data"
              action="{% url 'home' %}"
            >
              {% csrf_token %} {% block modal_form %}{% endblock %}
              <button type="submit" class="task-add-btn">Add Task</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <br />
    <div class="container">{% block content %}{% endblock %}</div>

    <!-- Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
